# PostgreSQL optimisé pour 12GB RAM / 6 vCPU / 300 MB/s I/O
# Placez ce fichier dans /etc/postgresql/*/main/ et redémarrez PostgreSQL

# === CONNEXIONS ===
max_connections = 200              # Augmenté pour cluster mode (6 workers * 4 instances frontend)

# === MEMORY ===
shared_buffers = 3GB               # 25% de RAM (12GB * 0.25)
effective_cache_size = 9GB         # 75% de RAM (12GB * 0.75)
work_mem = 32MB                    # (RAM - shared_buffers) / max_connections * 0.1
maintenance_work_mem = 1GB         # 8% de RAM

# === WRITE PERFORMANCE ===
wal_buffers = 64MB                 # 16MB par default, augmenté pour 12GB RAM
checkpoint_completion_target = 0.9
max_wal_size = 4GB
min_wal_size = 1GB
checkpoint_timeout = 15min

# === QUERY PLANNER ===
random_page_cost = 1.1             # SSD/NVMe optimization
effective_io_concurrency = 200     # Optimisé pour 300 MB/s I/O
max_parallel_workers = 6           # Utiliser tous les vCPU
max_parallel_workers_per_gather = 4
max_parallel_maintenance_workers = 4

# === AUTOVACUUM ===
autovacuum_max_workers = 4
autovacuum_naptime = 10s
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50

# === LOGGING ===
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_min_duration_statement = 1000  # Log queries > 1s
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on

# === OTHER ===
synchronous_commit = off           # Plus rapide (peut perdre 1 transaction en crash)
commit_delay = 0
max_worker_processes = 6
