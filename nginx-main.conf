# Nginx configuration principale optimisée pour Fassia Secret
# 12 GB RAM | 6 vCPU | 300 MB/s
# Placez ce fichier dans /etc/nginx/nginx.conf

user www-data;
worker_processes auto;
worker_rlimit_nofile 65535;
pid /run/nginx.pid;

events {
    worker_connections 65535;
    use epoll;
    multi_accept on;
}

http {
    # Basic Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # File limits
    open_file_cache max=200000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # Buffers
    client_body_buffer_size 128k;
    client_max_body_size 50m;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 8k;
    output_buffers 2 32k;
    postpone_output 1460;

    # Timeouts
    client_header_timeout 3m;
    client_body_timeout 3m;
    send_timeout 3m;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/opentype
        application/vnd.ms-fontobject
        application/pdf;
    gzip_min_length 1000;
    gzip_buffers 16 8k;

    # Brotli (priorité sur gzip - 15-20% plus efficace que gzip)
    brotli on;
    brotli_comp_level 6;
    brotli_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/opentype
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-font-opentype
        application/font-woff
        application/font-woff2
        application/pdf;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # Cache statique
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=static:100m max_size=5g inactive=60m use_temp_path=off;

    # Upstream : Frontend Next.js (4 instances)
    upstream frontend {
        least_conn;
        server 127.0.0.1:3000 weight=5 max_fails=3 fail_timeout=30s;
        keepalive 64;
    }

    # Upstream : Backend API (1 instance + 6 workers)
    upstream backend {
        least_conn;
        server 127.0.0.1:5000 weight=10 max_fails=3 fail_timeout=30s;
        keepalive 128;
    }

    # Inclure les sites
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;
}
