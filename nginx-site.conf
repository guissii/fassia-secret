# Fassia Secret Site Configuration (pour /etc/nginx/sites-available/fassiasecret)
# Les optimisations globales (worker_processes, events, etc.) sont dans /etc/nginx/nginx.conf

server {
    listen 80;
    listen [::]:80;
    server_name fassiasecret.com www.fassiasecret.com;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fassiasecret.com www.fassiasecret.com;

    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/fassiasecret.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fassiasecret.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/fassiasecret.com/chain.pem;

    # SSL optimization
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Logs
    access_log /var/log/nginx/fassiasecret.access.log;
    error_log /var/log/nginx/fassiasecret.error.log warn;

    # Cache control for static files
    location ~* \.(?:ico|css|js|gif|jpe?g|png|webp|svg|woff2?|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Vary "Accept-Encoding" always;
        access_log off;
    }

    # Next.js static files (_next/static)
    location /_next/static {
        proxy_pass http://frontend;
        proxy_cache static;
        proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
        proxy_cache_valid 200 1y;
        proxy_cache_lock on;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }

    # Images
    location /images {
        proxy_pass http://frontend;
        expires 1d;
        add_header Cache-Control "public" always;
        access_log off;
    }

    # API routes → Backend
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;

        # Rate limiting on API
        limit_req zone=api burst=100 nodelay;
        limit_conn addr 50;
    }

    # Everything else → Frontend (Next.js)
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }
}
